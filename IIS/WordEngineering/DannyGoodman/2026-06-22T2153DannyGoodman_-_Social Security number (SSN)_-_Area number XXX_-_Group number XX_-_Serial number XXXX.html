			<table>

					<td><label for="ssn">Social Security Number (SSN)</label></td>
					<td><input id="ssn" value="238-45-6766" pattern="^\d{3}-\d{2}-\d{4}" autofocus required/></td>

		<script>
			var isPostBack = false;
			
			const 	ssnElement = document.getElementById("ssn");
			const 	submitQueryElement = document.getElementById("submitQuery");
			const	resultSetElement = document.getElementById("resultSet");

			function pageLoad()
			{
				if (isPostBack === false)
				{
					const urlParams = new URLSearchParams(window.location.search);

					var ssnParam = urlParams.get("ssn");
					if (ssnParam)
					{
						ssnElement.value = ssnParam;
					}
				
					querySubmit();
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			function querySubmit()
			{
				resultSetElement.textContent = "";
				
				var ssnSeparated = ssnElement.value.split(SSN_Separator);
				
				var ssnArea = ssnSeparated[SSN_Rank_AreaNumber - 1];
				var ssnGroup = ssnSeparated[SSN_Rank_GroupNumber - 1];
				var ssnSerial = ssnSeparated[SSN_Rank_SerialNumber - 1];
				
				var ssnAreaFrom = "";
				var ssnAreaUntil = "";
				var ssnAreaBlock = [];

				var ssnGroupFrom = "";
				var ssnGroupUntil = "";
				var ssnGroupBlock = [];
				
				for
				(
					var ssnIndex = 0, ssnLength = SSN.length;
					ssnIndex <= ssnLength;
					++ssnIndex
				)
				{
					console.log(SSN[ssnIndex]);
					ssnAreaBlock = (SSN[ssnIndex][SSN_Rank_AreaNumber]).split(SSN_Separator);
					ssnAreaFrom = ssnAreaBlock[0];
					ssnAreaUntil = ssnAreaBlock[ssnAreaBlock.length - 1];
					if (ssnArea >= ssnAreaFrom && ssnArea <= ssnAreaUntil)
					{
						if (SSN[ssnIndex].length > SSN_Rank_GroupNumber)
						{
							ssnGroupBlock = (SSN[ssnIndex][SSN_Rank_GroupNumber]).split(SSN_Separator);
							ssnGroupFrom = ssnGroupBlock[0];
							ssnGroupUntil = ssnGroupBlock[ssnGroupBlock.length - 1];
							if (ssnGroup < ssnGroupFrom || ssnGroup > ssnGroupUntil)
							{
								continue;
							}
						}
						resultSetElement.textContent = SSN[ssnIndex][SSN_Rank_State];
						break;
					}
				}
			}

			submitQueryElement.addEventListener("click", querySubmit, false);
			
			var body = document.getElementsByTagName("body")[0];
			body.onkeydown = function (e) {
				if (e.keyCode === 13) {  //enter key code
					querySubmit();
