				var request = {};

				//request["selectQueryStatement"] = selectQueryStatementElement.value;
				
				const PostData = {
					method: "POST",
					headers: {
						"Accept": "application/json",

					},
					dataType: "json",
					credentials: "include"
				}
				PostData.body = JSON.stringify(request);
				url = "/WordEngineering/RegularExpression/2026-03-03T0520TheSoftwareCosts$2000AndItIsBundledWithTravel.asmx/Query";
				try {
					const response = await fetch(url, PostData)
					.then(response => {
						return response.json();
					})
					.then(responseJSON => {
						var dataTable = JSON.parse(responseJSON.d);
						scriptLiteral9432.renderDataTable(dataTable, "resultTable");
					})	
					} catch (e) {
					resultTableElement.innerHTML = e;
				};
			}
