	<body>
		<div align="center">
			Actor or role: <textarea id="actorRole"></textarea><br>
			<input type="submit" id="submitQuery"><br>
			<table id="resultTable" align="center">
				<thead>
					<tr><th align="left">Actor</th><th align="left">Role</th><th align="left">Scripture Reference</th></tr>
				</thead>
				<tbody id="resultTableBody"></tbody>
			</table>
		</div>
		<script>
			var isPostBack = false;
			
			const actorRoleElement = document.getElementById("actorRole");
			
			const resultTableElement = document.getElementById("resultTable");
			const resultTableBodyElement = document.getElementById("resultTableBody");
			
			const submitQueryElement = document.getElementById("submitQuery");

			function pageLoad()
			{
				if (isPostBack === false)
				{
					querySubmit();
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			function querySubmit()
			{
				var tableInfo = "";
				var regex;
				var isFound;
				const actorRoleElementValue = actorRoleElement.value.toLowerCase();
				var	ActorRoleJoin = "";
				for (var rowIndex = 0; rowIndex < ActorRole.length; rowIndex++)
				{
					/*
					regex = new RegExp( ActorRole[rowIndex].join( "|" ), "i");
					isFound = ( actorRoleElement.value === "" ) || regex.test( actorRoleElement.value )
					if ( isFound === false )
					{
						continue;
					}
					*/
					ActorRoleJoin = ActorRole[rowIndex].join( "|" ).toLowerCase();
					if ( ( actorRoleElement.value === "") || ActorRoleJoin.indexOf( actorRoleElementValue ) >= 0 ) 
					{
						tableInfo+= `<tr><td>${ActorRole[rowIndex][0]}</td><td>${ActorRole[rowIndex][1]}</td><td>${ActorRole[rowIndex][2]}</td></tr>`;	
					}	
				}
				resultTableBodyElement.innerHTML = tableInfo;
			}

			const ActorRole = [
				["Jesus Christ", "Creator", "John 1"],
				["Melchizedek", "King of Salem, Priest of the most high God", "Genesis 14:18-20"]
			];
			
			submitQueryElement.addEventListener("click", querySubmit, false);
			
			var body = document.getElementsByTagName('body')[0];
			body.onkeydown = function (e) {
				if (e.keyCode === 13) {  //enter key code
					querySubmit();
				}
			}

			window.addEventListener("load", pageLoad, false);
		</script>		
	</body>
