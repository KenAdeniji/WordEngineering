	<head>
		<title>2026-06-30T1652FrankTisellano.github.io_-_datatype.html</title>
		<meta charset="UTF-8"/>
		<meta name="description" content="2026-06-30T1652FrankTisellano.github.io_-_datatype.html"/>
		<meta name="keyword" content="chart"/>
		<meta name="robots" content="index, follow"/>
		<meta name="author" content="Ken Adeniji"/>
		<style>
			@font-face {
				font-family: 'Datatype';
				src: url('https://KenAdeniji.github.io/Github/Datatype-Regular.woff2') format('woff2');
			/*
				font-weight: 100 900; 
				font-stretch: 0% 100%;
				font-display: swap;
			*/
			}
				
			.chart {
			  font-family: 'Datatype', sans-serif;
			  /* Optional: adjust axes */
			  font-variation-settings: 'wdth' 15;
			  font-weight: 400;
			}

			html, body
			{
			  height: 100%;
			  width: 100%;
			}
			
			table 
			{
			   border: 1px solid black;
			   border-spacing: 5px;
			   border-collapse: separate;
			}

			th, td 
			{ 
				padding:5px 10px; border:#4e95f4 1px solid;
			}

			th 
			{
				background: blue;
			}

			tr:nth-child(even) 
			{
				background: #E1EEF4;
			}
			
			textarea
			{ 
				height: 25vh;
				width: 95vw;
			}
	</style>
	</head>
	</body>
		<div>
			<form method="post" id="formed" action="javascript:void(0);">
				<div align="center">
					<table>
							<tr>
							<td><label for="word">Word</label></td>
							<td>
								<input 
									id="word"
									type="text"
									value="20,45,60,55,80,95"
									style="width: 55vw;"
								/>
							</td>
						</tr>
						<tr>
							<td colspan="2" align="center">
								<input type="submit" id="submitQuery">
							</td>
						</tr>
					</table>
					<span class="chart" id="lineChart"></span><br>
					<span class="chart" id="barChart"></span><br>
				<div>	
			<form>	
		</div>	
		<script>
			var isPostBack = false;
			
			const 	formedElement = document.getElementById("formed");
			const 	submitQueryElement = document.getElementById("submitQuery");
			const 	wordElement = document.getElementById("word");
			const	lineChartElement = document.getElementById("lineChart");
			const	barChartElement = document.getElementById("barChart");
			
			function pageLoad()
			{
				if (isPostBack === false)
				{
					const urlParams = new URLSearchParams(window.location.search);
					var wordParam = urlParams.get("word");
					if (wordParam)
					{
						wordElement.value = wordParam;
					}	
					if (wordElement.value)
					{
						querySubmit();
					}	
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			async function querySubmit()
			{
				lineChartElement.textContent = `{l:${wordElement.value}}`;
				barChartElement.textContent = `{b:${wordElement.value}}`;
			}
			
			submitQueryElement.addEventListener("click", querySubmit, false);
			
			var body = document.getElementsByTagName("body")[0];
			body.onkeydown = function (e) 
			{
				if (e.keyCode === 13) 
				{  //enter key code
					querySubmit();
				}
			}

			window.addEventListener("load", pageLoad, false);
		</script>		
	</body>
</html>
