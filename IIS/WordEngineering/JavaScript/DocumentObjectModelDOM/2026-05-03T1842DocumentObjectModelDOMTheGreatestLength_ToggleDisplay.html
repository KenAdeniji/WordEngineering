<!DOCTYPE html>
<html>

	<head>
		<title>Document Object Model (DOM) the greatest length. Toggle display.</title>
		<meta charset="UTF-8"/>
		<meta name="description" content="Document Object Model (DOM) the greatest length. Toggle display"/>
		<meta name="keyword" content="Document Object Model (DOM), toggle display"/>
		<meta name="robots" content="index, follow"/>
		<meta name="author" content="Ken Adeniji"/>
		<style>
			html, body
			{
			  height: 100%;
			  width: 100%;
			}
			
			table 
			{
			   border: 1px solid black;
			   border-spacing: 5px;
			   border-collapse: separate;
			}

			th, td 
			{ 
				padding:5px 10px; border:#4e95f4 1px solid;
			}

			th 
			{
				background: blue;
			}

			tr:nth-child(even) 
			{
				background: #E1EEF4;
			}
			
			textarea
			{ 
				height: 20vh;
				width: 95vw;
			}

			iframe
			{ 
				height: 50vh;
				width: 95vw;
			}

			#resultSet
			{ 
				height: 5vh;
				width: 95vw;
			}
		</style>	
	</head>
	<body>
		<div>
			<form method="post" id="formed" action="javascript:void(0);">
				<div align="center">
					<table>
							<tr>
							<td><label for="sourceAddress">Source Address:</label></td>
							<td>
								<input 
									id="sourceAddress"
									type="url"
									value="https://kenadeniji.github.io/Github/2015-10-23DoctoralDissertation.html"
									style="width: 55vw;"
								/>
							</td>
						</tr>
						<tr>
							<td><label for="sourceSelector">Source Selector:</label></td>
							<td>
								<input 
									id="sourceSelector"
									type="text"
									value="h1, h2, h3, h4, h5, h6, table, ol, ul, li"
									style="width: 55vw;"
								/>
							</td>
						</tr>
						<tr>
							<td><label for="sourceContent">Source Content:</label></td>
							<td>
								<textarea id="sourceContent"></textarea>
							</td>
						</tr>
						<tr>
							<td colspan="2" align="center">
								<input type="submit" id="submitQuery">
								<button type="button" id="toggleDisplay">Toggle Display</button>
							</td>
						</tr>
					</table>
				<div>	
			<form>	
			<iframe id="frameInfo"></iframe>
			<br/>	
			<div id="resultSet"></div>
		</div>	
		<script>
			var isPostBack = false;
			var frameHTMLDocumentCurrent;
			
			const 	formedElement = document.getElementById("formed");
			const 	sourceAddressElement = document.getElementById("sourceAddress");
	
			const	sourceSelectorElement = document.getElementById("sourceSelector");
	
			const	sourceContentElement = document.getElementById("sourceContent");

			const 	submitQueryElement = document.getElementById("submitQuery");
			
			const	toggleDisplayElement = document.getElementById("toggleDisplay");

			const	frameInfoElement = document.getElementById("frameInfo");
			const 	resultSetElement = document.getElementById("resultSet");
			
			function pageLoad()
			{
				if (isPostBack === false)
				{
					const urlParams = new URLSearchParams(window.location.search);
					var sourceAddressParam = urlParams.get("sourceAddress");
					if (sourceAddressParam)
					{
						sourceAddressElement.value = sourceAddressParam;
					}	
					if (sourceAddressElement.value)
					{
						querySubmit();
					}	
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			async function querySubmit()
			{
				var	frameHTMLDocument;
				const response = await fetch( sourceAddressElement.value );
				const data = await response.text();

				sourceContentElement.value = data;
				frameInfoElement.srcdoc = data;
			}
			
			function displayToggle()
			{
				var	frameHTMLDocument = frameInfoElement.contentDocument || frameInfoElement.contentWindow.document;

				var currentElement;

				var styleDisplayElements = frameHTMLDocument.querySelectorAll(sourceSelectorElement.value);
				
				for 
				(
					var elementIndex = 0, elementCount = styleDisplayElements.length;
					elementIndex < elementCount;
					elementIndex++
				)
				{
					var currentElement = styleDisplayElements[elementIndex];

					if (currentElement.style.display === "none") 
					{
						currentElement.style.display = "block";
					} 
					else 
					{
						currentElement.style.display = "none";
					}
				}
			}

			submitQueryElement.addEventListener("click", querySubmit, false);
			
			toggleDisplayElement.addEventListener("click", displayToggle, false);
		
			var body = document.getElementsByTagName("body")[0];
			body.onkeydown = function (e) 
			{
				if (e.keyCode === 13) 
				{  //enter key code
					querySubmit();
				}
			}

			window.addEventListener("load", pageLoad, false);
		</script>		
	</body>
</html>
