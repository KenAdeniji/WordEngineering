	<head>
		<title>Document Object Model (DOM) Who is developing... according to who? Do select on data-attribute? data-key=data-value?</title>
		<meta charset="UTF-8"/>
		<meta name="description" content="Document Object Model (DOM) Who is developing... according to who? Do select on data-attribute? data-key=data-value?"/>
		<meta name="keyword" content="Document Object Model (DOM), data-attribute, data-key, data-value"/>
		<meta name="robots" content="index, follow"/>
		<meta name="author" content="Ken Adeniji"/>
		<style>
			html, body
			{
			  height: 100%;
			  width: 100%;
			}
			
			table 
			{
			   border: 1px solid black;
			   border-spacing: 5px;
			   border-collapse: separate;
			}

			th, td 
			{ 
				padding:5px 10px; border:#4e95f4 1px solid;
			}

			th 
			{
				background: blue;
			}

			tr:nth-child(even) 
			{
				background: #E1EEF4;
			}
			
			textarea, iframe, #resultSet
			{ 
				height: 25vh;
				width: 95vw;
			}
		</style>	
	</head>
	<body>
		<div>
			<form method="post" id="formed" action="javascript:void(0);">
				<div align="center">
					<table>
							<tr>
							<td><label for="sourceAddress">Source Address:</label></td>
							<td>
								<input 
									id="sourceAddress"
									type="url"
									value="https://kenadeniji.github.io/Github/2015-10-23DoctoralDissertation.html"
									style="width: 55vw;"
								/>
							</td>
						</tr>
						<tr>
							<td><label for="dataAttributeKeySelector">Data-attribute key selector:</label></td>
							<td>
								<input 
									id="dataAttributeKeySelector"
									type="text"
									value="data-ContactID"
									style="width: 55vw;"
								/>
							</td>
						</tr>
						<tr>
							<td><label for="dataAttributeValueSelector">Data-attribute value selector:</label></td>
							<td>
								<input 
									id="dataAttributeValueSelector"
									type="text"
									style="width: 55vw;"
								/>
							</td>
						</tr>
						<tr>
							<td><label for="sourceContent">Source Content:</label></td>
							<td>
								<textarea id="sourceContent"></textarea>
							</td>
						</tr>
						<tr>
							<td colspan="2" align="center">
								<input type="submit" id="submitQuery">
								<button type="button" id="dataAttributeQuery">Data Attribute Query</button>
							</td>
						</tr>
					</table>
				<div>	
			<form>	
			<iframe id="frameInfo"></iframe>
			<br/>	
			<div id="resultSet"></div>
		</div>	
		<script>
			var isPostBack = false;
			var frameHTMLDocumentCurrent;
			
			const 	formedElement = document.getElementById("formed");
			const 	sourceAddressElement = document.getElementById("sourceAddress");
	
			const	dataAttributeKeySelectorElement = document.getElementById("dataAttributeKeySelector");
			const	dataAttributeValueSelectorElement = document.getElementById("dataAttributeValueSelector");
	
			const	sourceContentElement = document.getElementById("sourceContent");

			const 	submitQueryElement = document.getElementById("submitQuery");
			
			const	dataAttributeQueryElement = document.getElementById("dataAttributeQuery");

			const	frameInfoElement = document.getElementById("frameInfo");
			const 	resultSetElement = document.getElementById("resultSet");
			
			function pageLoad()
			{
				if (isPostBack === false)
				{
					const urlParams = new URLSearchParams(window.location.search);
					var sourceAddressParam = urlParams.get("sourceAddress");
					if (sourceAddressParam)
					{
						sourceAddressElement.value = sourceAddressParam;
					}	
					if (sourceAddressElement.value)
					{
						querySubmit();
					}	
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			async function querySubmit()
			{
				var	frameHTMLDocument;
				const response = await fetch( sourceAddressElement.value );
				const data = await response.text();

				sourceContentElement.value = data;
				frameInfoElement.srcdoc = data;
			}
			
			function queryDataAttribute()
			{
				var	frameHTMLDocument = frameInfoElement.contentDocument || frameInfoElement.contentWindow.document;

				var dataAttributeSelector = dataAttributeValueSelectorElement.value === ""
					? 	`[${dataAttributeKeySelectorElement.value}]`
					:	`[${dataAttributeKeySelectorElement.value}='${dataAttributeValueSelectorElement.value}']`

				nodes = frameHTMLDocument.querySelectorAll(dataAttributeSelector);
				 
				resultSetElement.innerHTML = "";
				 
				nodes.forEach
				(
					function(el)
					{
						resultSetElement.innerHTML += `${el.nodeName} ${el.id}=${el.getAttribute(dataAttributeKeySelectorElement.value)} `;
					}
				);				 
			}

			submitQueryElement.addEventListener("click", querySubmit, false);
			
			dataAttributeQueryElement.addEventListener("click", queryDataAttribute, false);
		
			var body = document.getElementsByTagName("body")[0];
			body.onkeydown = function (e) 
			{
				if (e.keyCode === 13) 
				{  //enter key code
					querySubmit();
				}
			}

			window.addEventListener("load", pageLoad, false);
		</script>		
	</body>
</html>
