<!DOCTYPE html>
<html>
	<!--

	<head>
		<title>Document Object Model (DOM) Convert OrderedList Type</title>
		<meta charset="UTF-8"/>
		<meta name="description" content="Document Object Model (DOM) Convert OrderedList Type"/>
		<meta name="keyword" content="Document Object Model (DOM), Convert, OrderedList Type, UnorderedList, ol tag, ul tag"/>
		<meta name="robots" content="index, follow"/>
		<meta name="author" content="Ken Adeniji"/>
		<style>
			html, body
			{
			  height: 100%;
			  width: 100%;
			}
			
			table 
			{
			   border: 1px solid black;
			   border-spacing: 5px;
			   border-collapse: separate;
			}

			th, td 
			{ 
				padding:5px 10px; border:#4e95f4 1px solid;
			}

			th 
			{
				background: blue;
			}

			tr:nth-child(even) 
			{
				background: #E1EEF4;
			}
			
			textarea
			{ 
				height: 20vh;
				width: 95vw;
			}

			iframe
			{ 
				height: 50vh;
				width: 95vw;
			}

			#resultSet
			{ 
				height: 5vh;
				width: 95vw;
			}
		</style>	
	</head>
	<body>
		<div>
			<form method="post" id="formed" action="javascript:void(0);">
				<div align="center">
					<table>
							<tr>
							<td><label for="sourceAddress">Source Address:</label></td>
							<td>
								<input 
									id="sourceAddress"
									type="url"
									value="https://kenadeniji.github.io/Github/2015-10-23DoctoralDissertation.html"
									style="width: 55vw;"
								/>
							</td>
						</tr>
						<tr>
							<td><label for="orderedListNumberingType">Ordered List Numbering Type:</label></td>
							<td><select id="orderedListNumberingType" style="width: 55vw;"></select></td>
						</tr>
						<tr>
							<td><label for="unorderedListFlag">Unordered List:</label></td>
							<td><input id="unorderedListFlag" type="checkbox" checked></td>
						</tr>
						<tr>
							<td><label for="sourceContent">Source Content:</label></td>
							<td>
								<textarea id="sourceContent"></textarea>
							</td>
						</tr>
						<tr>
							<td colspan="2" align="center">
								<input type="submit" id="submitQuery">
								<button type="button" id="changeOrderingType">Change ordering type</button>
							</td>
						</tr>
					</table>
				<div>	
			<form>	
			<iframe id="frameInfo"></iframe>
			<br/>	
			<div id="resultSet"></div>
		</div>	
		<script>
			var isPostBack = false;
			var frameHTMLDocumentCurrent;
			
			const 	formedElement = document.getElementById("formed");
			const 	sourceAddressElement = document.getElementById("sourceAddress");
	
			const	orderedListNumberingTypeElement = document.getElementById("orderedListNumberingType");
	
			const	sourceContentElement = document.getElementById("sourceContent");

			const 	submitQueryElement = document.getElementById("submitQuery");
			
			const	changeOrderingTypeElement = document.getElementById("changeOrderingType");

			const	frameInfoElement = document.getElementById("frameInfo");
			const 	resultSetElement = document.getElementById("resultSet");
			
			function pageLoad()
			{
				if (isPostBack === false)
				{
					const urlParams = new URLSearchParams(window.location.search);
					var sourceAddressParam = urlParams.get("sourceAddress");
					if (sourceAddressParam)
					{
						sourceAddressElement.value = sourceAddressParam;
					}	
					if (sourceAddressElement.value)
					{
						querySubmit();
					}	
					
					buildSelect("orderedListNumberingType", OrderedListNumberingType);
					orderedListNumberingTypeElement.value = "1";
					
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			async function querySubmit()
			{
				var	frameHTMLDocument;
				const response = await fetch( sourceAddressElement.value );
				const data = await response.text();

				sourceContentElement.value = data;
				frameInfoElement.srcdoc = data;
			}
			
			function buildSelect(selectControl, selectChoices)
			{
				var select = document.getElementById(selectControl);
				select.options.length = 0;
				for (var index = 0, length = selectChoices.length; index < length; ++index)
				{
					var option = document.createElement("option");
					var multiDimensionArray = (selectChoices[index].constructor === Array);
					if (selectChoices[index]["text"])
					{
						option.text = selectChoices[index]["text"];
						if (selectChoices[index]["value"])
						{
							option.value = selectChoices[index]["value"];
						}	
						else
						{
							option.value = selectChoices[index]["text"];
						}	
					}	
					else if(multiDimensionArray)				
					{	
						option.text = selectChoices[index][0];
						option.value = selectChoices[index][1];
					}
					else
					{
						option.text = selectChoices[index];
						option.value = selectChoices[index];
					}				
					select.appendChild(option);
				}
			}

			function orderingTypeChange()
			{
				var	frameHTMLDocument = frameInfoElement.contentDocument || frameInfoElement.contentWindow.document;

				var currentElement;

				var styleDisplayElements = frameHTMLDocument.querySelectorAll
				(
					"ol" + 
					orderedListNumberingTypeElement.checked ? ", ul" : ""
				);
				
				for 
				(
					var elementIndex = 0, elementCount = styleDisplayElements.length;
					elementIndex < elementCount;
					elementIndex++
				)
				{
					var currentElement = styleDisplayElements[elementIndex];
					currentElement.type = orderedListNumberingType.value;
				}
			}

			submitQueryElement.addEventListener("click", querySubmit, false);
			
			changeOrderingTypeElement.addEventListener("click", orderingTypeChange, false);
		
			var body = document.getElementsByTagName("body")[0];
			body.onkeydown = function (e) 
			{
				if (e.keyCode === 13) 
				{  //enter key code
					querySubmit();
				}
			}

			window.addEventListener("load", pageLoad, false);

			const OrderedListNumberingType	=
			[
				["a for lowercase letters", "a"],
				["A for uppercase letters", "A"],
				["i for lowercase Roman numerals", "i"],
				["I for uppercase Roman numerals", "I"],
				["1 for numbers (default)", "1"]
			];
		</script>		
	</body>
</html>
