	<head>
		<title>Generate_Series()</title>
		<meta charset="UTF-8"/>
		<meta name="description" content="Generate_Series()"/>
		<meta name="keyword" content="Generate_Series()"/>

		<style>
			html, body
			{
			  height: 100%;
			  width: 100%;
			}
			
			table 
			{
			   border: 1px solid black;
			   border-spacing: 5px;
			   border-collapse: separate;
			}

			th, td 
			{ 
				padding:5px 10px; border:#4e95f4 1px solid;
			}

			th 
			{
				background: blue;
			}

			tr:nth-child(even) 
			{
				background: #E1EEF4;
			}
			
			textarea, output
			{ 
				height: 30vh;
				width: 80vw;
			}
		</style>	
	</head>
	<body>
		<div>
			<form method="post" id="formed" action="javascript:void(0);">
				<div align="center">
					<table>
						<tr>
							<td><label for="documentExpression">Document Expression:</label></td>
							<td>
								<textarea id="documentExpression">
var occurrences = 6;
var fromStartBegin = 2026;
var step = 6;
[...Array(occurrences).keys()].map(i => fromStartBegin + (i * step));
								</textarea>
							</td>
						</tr>
						<tr>
							<td colspan="2" align="center">
								<input type="submit" id="submitQuery">
							</td>
						</tr>
					</table>
				<div>	
			<form>	
			<output id="resultSet"></output>
		</div>	
		<script>
			var isPostBack = false;
			
			const 	formedElement = document.getElementById("formed");

			const	documentExpressionElement = document.getElementById("documentExpression");
			
			const 	submitQueryElement = document.getElementById("submitQuery");
			
			const 	resultSetElement = document.getElementById("resultSet");
			
			function pageLoad()
			{
				if (isPostBack === false)
				{
					const urlParams = new URLSearchParams(window.location.search);
					var documentExpressionParam = urlParams.get("documentExpression");
					if (documentExpressionParam)
					{
						documentExpressionElement.innerHTML = documentExpressionParam;
					}	
					if (documentExpressionElement.innerHTML)
					{
						querySubmit();
					}	
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			async function querySubmit()
			{
				resultSetElement.innerHTML = eval(documentExpressionElement.value);
			}
			
			submitQueryElement.addEventListener("click", querySubmit, false);
		
			var body = document.getElementsByTagName("body")[0];
			body.onkeydown = function (e) 
			{
				if (e.keyCode === 13) 
				{  //enter key code
					querySubmit();
				}
			}

			window.addEventListener("load", pageLoad, false);
		</script>		
	</body>
</html>
