		<script>
			var isPostBack = false;
			
			const contactIDMinimumElement = document.getElementById("contactIDMinimum");
			const contactIDMaximumElement = document.getElementById("contactIDMaximum");
			const datePartElement = document.getElementById("datePart");
			const resultTableElement = document.getElementById("resultTable");
			const submitQueryElement = document.getElementById("submitQuery");

			function pageLoad()

				if (isPostBack === false)
				{
					scriptLiteral9432.renderDatePartedSelect();
					querySubmit();
					isPostBack = true;
				}
				else
				{
					querySubmit();
				}
 			}

			async function querySubmit()
			{
				console.log("responseJSON.d");
				var request = {};

				request["contactIDMinimum"] = Number.parseInt(contactIDMinimumElement.value);
				request["contactIDMaximum"] = Number.parseInt(contactIDMaximumElement.value);
				request["datePart"] = datePartElement.value;
				
				const PostData = {
					method: "POST",
					headers: {
						"Accept": "application/json",
						"Content-Type": "application/json; charset=utf-8"
					},
					dataType: "json",
					credentials: "include"
				}
				PostData.body = JSON.stringify(request);
				url = "/WordEngineering/TimeSeries/2026-03-31T0555Aileen.A.Nielsen@gmail.com_-_PracticalTimeSeriesAnalysis_-_HowCanIQueryByPeriod_WeekMonthOrYear.asmx/Query";
				try {
					const response = await fetch(url, PostData)
					.then(response => {
						return response.json();
					})
					.then(responseJSON => {
						console.log("responseJSON.d");
						var dataTable = JSON.parse(responseJSON.d);
						scriptLiteral9432.renderDataTable(dataTable, "resultTable");
					})	
					} catch (e) {
					resultTableElement.innerHTML = e;
				};
			}

			submitQueryElement.addEventListener("click", querySubmit, false);
			
			var body = document.getElementsByTagName('body')[0];
			body.onkeydown = function (e) {
				if (e.keyCode === 13) {  //enter key code
					querySubmit();
				}
			}

			window.addEventListener("load", pageLoad, false);
